{% extends "base.html" %}
{% block title %}Build a Contest{% endblock %}

{% block content %}
<div class="app-shell">
    <nav class="navbar">
        <div class="navbar-brand">Codeclan</div>
        <div class="navbar-right">
            <a href="/dashboard">Back to Dashboard</a>
        </div>
    </nav>

    <main class="dashboard-main">
        <section class="card">
            <h2>Build a New Contest</h2>

            {% if not user.codeforces_handle %}
            <p style="color:red;">link your Codeforces handle from the dashboard first.</p>
            {% endif %}

            <div class="form-group">
                <label for="title">Contest Title</label>
                <input type="text" id="title" placeholder="e.g. Fun Practice contest">
            </div>

            <div class="form-group">
                <label for="rating_min">Min Rating</label>
                <select id="rating_min"></select>
            </div>
            <div class="form-group">
                <label for="rating_max">Max Rating</label>
                <select id="rating_max"></select>
            </div>

            <div class="form-group">
                <label>Topics</label>
                <div id="topics-grid"></div>
            </div>

            <div class="form-group">
                <label for="num_questions">Number of Questions</label>
                <select id="num_questions">
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                </select>
            </div>

            <button id="generate-btn" {% if not user.codeforces_handle %}disabled{% endif %}>
                Generate Contest
            </button>
            <p id="generate-message"></p>
        </section>
    </main>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/create_contest.js') }}"></script>
{% endblock %}
